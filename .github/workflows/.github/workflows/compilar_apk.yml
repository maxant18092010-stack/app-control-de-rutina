name: Compilar APK Nativo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código de tu repositorio
      - name: Checkout del código
        uses: actions/checkout@v3

      # 2. Configurar Java JDK (indispensable para compilar Android nativo)
      - name: Configurar Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Darle permisos de ejecución al compilador de Android (Gradle)
      - name: Cambiar permisos a Gradle
        run: chmod +x ./gradlew
        continue-on-error: true # Por si el archivo se ejecuta directo

      # 4. Compilar el APK en modo de prueba/desarrollo
      - name: Compilar APK de Android
        run: ./gradlew assembleDebug

      # 5. Guardar el archivo APK para que lo descargues
      - name: Subir APK generado
        uses: actions/upload-artifact@v4
        with:
          name: app-nativa-apk
          path: app/build/outputs/apk/debug/app-debug.apk
