name: Compilar APK Nativa Vibe Code

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar tu código nativo (.kt y .xml)
      - name: Checkout del código
        uses: actions/checkout@v3

      # 2. Configurar Java JDK 17 (Esencial para Kotlin/Android)
      - name: Configurar Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Crear la estructura de Gradle desde cero dentro de tu carpeta "routine-flow"
      - name: Generar entorno Android Studio faltante
        run: |
          cd routine-flow
          gradle init --type basic --dsl groovy --incubating
          
          # Crear un archivo build.gradle básico si no existe para que pueda compilarse como app
          if [ ! -f build.gradle ]; then
            echo 'plugins { id "com.android.application" version "8.1.0" apply false }' > build.gradle
          fi

      # 4. Compilar los archivos nativos usando Gradle
      - name: Compilar APK de Android
        run: |
          cd routine-flow
          gradle assembleDebug --stacktrace

      # 5. Guardar el APK final para descargar
      - name: Subir APK generado
        uses: actions/upload-artifact@v4
        with:
          name: app-nativa-apk
          path: 'routine-flow/**/build/outputs/apk/debug/*.apk'
