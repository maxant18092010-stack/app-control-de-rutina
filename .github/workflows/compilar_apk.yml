name: Compilar APK Nativo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código de tu repositorio
      - name: Checkout del código
        uses: actions/checkout@v3

      # 2. Configurar Java JDK 17
      - name: Configurar Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Configurar Gradle automáticamente
      - name: Configurar Gradle
        uses: gradle/gradle-build-action@v2

      # 4. Buscar la carpeta correcta y compilar el APK desde ahí
      - name: Compilar APK de Android
        run: |
          # Busca dónde está el archivo settings.gradle o build.gradle y entra a esa carpeta
          GRADLE_DIR=$(find . -name "settings.gradle" -o -name "build.gradle" | head -n 1 | xargs dirname)
          echo "Proyecto encontrado en la carpeta: $GRADLE_DIR"
          cd "$GRADLE_DIR"
          gradle assembleDebug

      # 5. Guardar el archivo APK para descargar
      - name: Subir APK generado
        uses: actions/upload-artifact@v4
        with:
          name: app-nativa-apk
          path: '**/build/outputs/apk/debug/app-debug.apk'
