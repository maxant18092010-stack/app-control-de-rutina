name: Compilar APK Vibe Code

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar tu código
      - name: Checkout del código
        uses: actions/checkout@v3

      # 2. Configurar Node.js para empaquetar la app web de Vibe Code
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Configurar Java para compilar el APK
      - name: Configurar Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Instalar Capacitor e inicializarlo correctamente sin usar el punto (.)
      - name: Inicializar contenedor de Android
        run: |
          cd routine-flow
          npm init -y
          npm install @capacitor/core @capacitor/cli
          npx cap init "Control de Rutina" "com.app.controlrutina" --web-dir=""
          npm install @capacitor/android
          npx cap add android
          npx cap sync android

      # 5. Compilar el archivo APK real
      - name: Compilar APK de Android
        run: |
          cd routine-flow/android
          ./gradlew assembleDebug

      # 6. Guardar el archivo APK para que lo descargues
      - name: Subir APK generado
        uses: actions/upload-artifact@v4
        with:
          name: app-vibe-apk
          path: 'routine-flow/android/app/build/outputs/apk/debug/app-debug.apk'
